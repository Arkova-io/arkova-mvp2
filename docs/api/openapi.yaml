openapi: 3.0.3
info:
  title: Arkova Verification API
  description: |
    Privacy-first document verification anchored to Bitcoin.

    ## Authentication
    - **API Key**: Include `X-API-Key` header with your key (get one at /api/v1/keys)
    - **x402 Payment**: Include `X-Payment` header with base64-encoded payment proof
    - Some endpoints accept both methods

    ## Rate Limits
    - Anonymous: 100 req/min per IP
    - API Key: 1,000 req/min per key
    - Batch: 10 req/min
    - AI endpoints: 30 req/min per user

    Headers returned on every response:
    - `X-RateLimit-Limit`, `X-RateLimit-Remaining`, `X-RateLimit-Reset`
    - `Retry-After` (on 429 responses)
  version: "1.0.0"
  contact:
    name: Arkova Engineering
    url: https://arkova.ai
  license:
    name: Proprietary

servers:
  - url: https://arkova-worker-270018525501.us-central1.run.app/api/v1
    description: Production
  - url: http://localhost:3001/api/v1
    description: Local development

security:
  - apiKey: []
  - x402Payment: []

paths:
  /verify/{publicId}:
    get:
      operationId: verifyDocument
      summary: Verify a document by public ID
      description: Returns the verification status and anchor details for a document.
      tags: [Verification]
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            example: ARK-2026-TEST-001
          description: The document's public identifier
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"
        "404":
          description: Record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Payment required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentRequired"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer

  /verify/{publicId}/proof:
    get:
      operationId: getMerkleProof
      summary: Get Merkle proof for a batch-anchored document
      description: Returns the Merkle inclusion proof for independent client-side verification.
      tags: [Verification]
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Merkle proof data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerkleProofResponse"
        "404":
          description: No proof available

  /verify/batch:
    post:
      operationId: batchVerify
      summary: Batch verify multiple documents
      description: Submit up to 100 public IDs for batch verification. Returns a job ID for polling.
      tags: [Verification]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_ids]
              properties:
                public_ids:
                  type: array
                  items:
                    type: string
                  maxItems: 100
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  status:
                    type: string
                    enum: [pending]

  /verify/entity:
    get:
      operationId: entityVerify
      summary: Search records for an entity
      description: Search across all records for a specific entity (person or organization).
      tags: [Verification]
      parameters:
        - name: entity
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entity verification results
        "402":
          description: Payment required

  /anchor:
    post:
      operationId: anchorDocument
      summary: Submit a document fingerprint for anchoring
      description: Submits a SHA-256 fingerprint to be anchored to Bitcoin via Merkle batch.
      tags: [Anchoring]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fingerprint]
              properties:
                fingerprint:
                  type: string
                  description: SHA-256 hash of the document
                  pattern: "^[a-fA-F0-9]{64}$"
                credential_type:
                  type: string
                  enum: [DEGREE, LICENSE, CERTIFICATE, TRANSCRIPT, CLE, PROFESSIONAL, BADGE, ATTESTATION, FINANCIAL, LEGAL, INSURANCE, SEC_FILING, PATENT, REGULATION, PUBLICATION, OTHER]
                description:
                  type: string
                  maxLength: 500
      responses:
        "201":
          description: Anchor created
          content:
            application/json:
              schema:
                type: object
                properties:
                  public_id:
                    type: string
                  status:
                    type: string
                    enum: [PENDING]
                  fingerprint:
                    type: string

  /ai/extract:
    post:
      operationId: aiExtract
      summary: Extract metadata from PII-stripped credential text
      description: Uses AI to extract structured metadata fields from credential text. Input must be PII-stripped.
      tags: [AI]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionRequest"
      responses:
        "200":
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionResult"

  /ai/search:
    post:
      operationId: aiSearch
      summary: Semantic search across records
      description: Search records using natural language queries via AI embeddings.
      tags: [AI]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                limit:
                  type: integer
                  default: 10
                  maximum: 50
      responses:
        "200":
          description: Search results

  /nessie/query:
    post:
      operationId: nessieQuery
      summary: Ask Nessie a compliance question
      description: RAG-powered compliance Q&A using regulatory records.
      tags: [Nessie]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                context:
                  type: string
      responses:
        "200":
          description: Nessie response
        "402":
          description: Payment required

  /compliance/check:
    post:
      operationId: complianceCheck
      summary: Check entity against regulatory records
      tags: [Compliance]
      responses:
        "200":
          description: Compliance check result
        "402":
          description: Payment required

  /keys:
    post:
      operationId: createApiKey
      summary: Create a new API key
      description: Requires Supabase JWT authentication.
      tags: [Key Management]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: API key created (raw key returned only once)

  /usage:
    get:
      operationId: getUsage
      summary: Get API usage statistics
      tags: [Usage]
      security:
        - apiKey: []
      responses:
        "200":
          description: Usage statistics

  /jobs/{jobId}:
    get:
      operationId: getJobStatus
      summary: Poll batch job status
      tags: [Jobs]
      security:
        - apiKey: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status and results

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: HMAC-SHA256 hashed API key
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase JWT token
    x402Payment:
      type: apiKey
      in: header
      name: X-Payment
      description: Base64-encoded x402 payment proof

  schemas:
    VerificationResult:
      type: object
      required: [verified]
      properties:
        verified:
          type: boolean
        status:
          type: string
          enum: [ACTIVE, REVOKED, SUPERSEDED, EXPIRED, PENDING]
        issuer_name:
          type: string
        recipient_identifier:
          type: string
        credential_type:
          type: string
        issued_date:
          type: string
          format: date
          nullable: true
        expiry_date:
          type: string
          format: date
          nullable: true
        anchor_timestamp:
          type: string
          format: date-time
        bitcoin_block:
          type: integer
          nullable: true
        network_receipt_id:
          type: string
          nullable: true
        merkle_proof_hash:
          type: string
          nullable: true
        record_uri:
          type: string
          format: uri
        jurisdiction:
          type: string
          description: Omitted when null (frozen schema)
        explorer_url:
          type: string
          format: uri
          description: Deep link to network explorer
        description:
          type: string
          description: Immutable credential description
        error:
          type: string

    MerkleProofResponse:
      type: object
      required: [public_id, fingerprint, merkle_root, merkle_proof, verified]
      properties:
        public_id:
          type: string
        fingerprint:
          type: string
        merkle_root:
          type: string
        merkle_proof:
          type: array
          items:
            type: object
            properties:
              hash:
                type: string
              position:
                type: string
                enum: [left, right]
        tx_id:
          type: string
          nullable: true
        block_height:
          type: integer
          nullable: true
        block_timestamp:
          type: string
          format: date-time
          nullable: true
        batch_id:
          type: string
          nullable: true
        verified:
          type: boolean

    ExtractionRequest:
      type: object
      required: [strippedText, credentialType, fingerprint]
      properties:
        strippedText:
          type: string
          description: PII-stripped credential text (client-side stripping applied)
        credentialType:
          type: string
          enum: [DEGREE, LICENSE, CERTIFICATE, TRANSCRIPT, CLE, PROFESSIONAL, BADGE, ATTESTATION, FINANCIAL, LEGAL, INSURANCE, SEC_FILING, PATENT, REGULATION, PUBLICATION, OTHER]
        fingerprint:
          type: string
          description: SHA-256 hash of the original document
        issuerHint:
          type: string
          description: Optional issuer name hint

    ExtractionResult:
      type: object
      required: [fields, confidence, provider]
      properties:
        fields:
          type: object
          description: Extracted metadata fields
          properties:
            credentialType:
              type: string
            issuerName:
              type: string
            issuedDate:
              type: string
              format: date
            expiryDate:
              type: string
              format: date
            fieldOfStudy:
              type: string
            degreeLevel:
              type: string
            licenseNumber:
              type: string
            accreditingBody:
              type: string
            jurisdiction:
              type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        provider:
          type: string
        tokensUsed:
          type: integer

    ErrorResponse:
      type: object
      properties:
        verified:
          type: boolean
          example: false
        error:
          type: string

    PaymentRequired:
      type: object
      properties:
        error:
          type: string
          example: payment_required
        x402:
          type: object
          properties:
            version:
              type: string
            price:
              type: string
            payeeAddress:
              type: string
            network:
              type: string
